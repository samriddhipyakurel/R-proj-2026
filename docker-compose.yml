
services:
  web:
    build:
      context: .
      target: runner
    container_name: trendseer-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
    env_file:
      - .env
    networks:
      - trendseer-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  nginx:
    build:
      context: .
      target: nginx
    container_name: trendseer-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      web:
        condition: service_healthy
    networks:
      - trendseer-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

networks:
  trendseer-net:
    driver: bridge

volumes:
  nginx_cache:
  nginx_logs:
